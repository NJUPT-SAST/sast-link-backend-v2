            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedResponse"
  /profile/unbind:
    post:
      tags: [OAuth 登录]
      summary: 解除第三方 OAuth 绑定
      description: |
        解除指定 provider（github/lark）的 OAuth 绑定。
        解绑后需保证至少有一种登录方式可用。教育邮箱不可解绑。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider]
              properties:
                provider:
                  type: string
                  enum: [github, lark]
                  description: 要解绑的 provider
      responses:
        "200":
          description: |-
            解绑成功

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效
            - `10014` 解绑失败（解绑后无可用登录方式，或该 OAuth 未绑定）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedResponse"
  /profile/bindEmail:
    post:
      tags: [邮箱绑定]
      summary: 发起邮箱绑定
      description: |
        已登录用户绑定第三方邮箱。发送验证码到指定邮箱，生成 BindEmail-Ticket。
        限流 2 次/分钟。禁止绑定 @njupt.edu.cn 邮箱。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: 要绑定的第三方邮箱
      responses:
        "200":
          description: |-
            验证码已发送

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效
            - `10016` 绑定邮箱数量已达上限（2 个）
            - `10017` 邮箱已被其他用户绑定
            - `10018` 解绑冷却中
            - `30003` 邮箱格式错误
            - `10008` 操作太频繁
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UnifiedResponse"
                properties:
                  Data:
                    type: object
                    properties:
                      bindEmailTicket:
                        type: string
  /profile/verifyBindEmail:
    post:
      tags: [邮箱绑定]
      summary: 验证并完成邮箱绑定
      description: |
        验证 bindEmailTicket + 验证码后完成绑定。上限 2 个邮箱/用户。
        限流 10 次/分钟/IP。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, captcha, bindEmailTicket]
              properties:
                email:
                  type: string
                  format: email
                captcha:
                  type: string
                  description: 邮箱验证码
                bindEmailTicket:
                  type: string
                  description: bindEmail 接口返回的阶段凭证
      responses:
        "200":
          description: |-
            绑定成功

            常见错误码：
            - `30004` 绑定邮箱验证码错误
            - `30005` 绑定邮箱 Ticket 无效
            - `80003` 邮箱绑定失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedResponse"
  /profile/unbindEmail:
    post:
      tags: [邮箱绑定]
      summary: 发起邮箱解绑
      description: |
        发送解绑验证码到指定邮箱，生成 UnbindEmail-Ticket。限流 2 次/分钟。
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  description: 要解绑的邮箱
      responses:
        "200":
          description: |-
            验证码已发送

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效
            - `10008` 操作太频繁
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UnifiedResponse"
                properties:
                  Data:
                    type: object
                    properties:
                      unbindEmailTicket:
                        type: string
  /profile/confirmUnbindEmail:
    post:
      tags: [邮箱绑定]
      summary: 确认解绑邮箱
      description: |
        验证 unbindEmailTicket + 验证码后完成解绑。
        解绑后该邮箱进入 1 分钟冷却期（Redis TTL 60s），冷却期内不可重新绑定。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, captcha, unbindEmailTicket]
              properties:
                email:
                  type: string
                  format: email
                captcha:
                  type: string
                  description: 邮箱验证码
                unbindEmailTicket:
                  type: string
                  description: unbindEmail 接口返回的阶段凭证
      responses:
        "200":
          description: |-
            解绑成功

            常见错误码：
            - `30006` 解绑验证码错误
            - `30005` 解绑邮箱 Ticket 无效
            - `10008` 操作太频繁
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedResponse"
  /profile/emails:
    get:
      tags: [邮箱绑定]
      summary: 获取已绑定邮箱
      description: 返回当前用户已绑定的第三方邮箱列表。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: |-
            成功

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UnifiedResponse"
                properties:
                  Data:
                    type: array
                    items:
                      $ref: "#/components/schemas/BindEmailItem"
  /oauth2/authorize:
    get:
      tags: [OAuth 2.1 授权服务端]
      summary: 授权端点
      description: |
        OAuth 2.1 授权端点。用户需先通过第一方登录获取 Session Cookie，
        未登录时 302 重定向到登录页。PKCE-S256 强制。
      parameters:
        - name: response_type
          in: query
          required: true
          schema:
            type: string
            enum: [code]
        - name: client_id
          in: query
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: 必须在客户端注册的白名单内
        - name: scope
          in: query
          required: false
          schema:
            type: string
          description: 空格分隔的权限列表，如 `profile email`
        - name: state
          in: query
          required: false
          schema:
            type: string
          description: CSRF 防护，原样回传
        - name: code_challenge
          in: query
          required: true
          schema:
            type: string
          description: PKCE - Base64URL(SHA256(code_verifier))
        - name: code_challenge_method
          in: query
          required: true
          schema:
            type: string
            enum: [S256]
      responses:
        "302":
          description: |
            成功：重定向到 `redirect_uri?code={授权码}&state={state}`，授权码 10 分钟有效，单次使用
            用户未登录：重定向到登录页
            用户拒绝：重定向到 `redirect_uri?error=access_denied`
            参数错误：重定向到 `redirect_uri?error=invalid_request`

  /oauth2/token:
    post:
      tags: [OAuth 2.1 授权服务端]
      summary: Token 端点
      description: |
        交换授权码获取 Token，或刷新 Token。
        confidential client 需提供 client_secret，public client（含第一方）无需。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id]
              properties:
                grant_type:
                  type: string
                  enum: [authorization_code, refresh_token]
                code:
                  type: string
                  description: 授权码（authorization_code 时必填）
                refresh_token:
                  type: string
                  description: Refresh Token（refresh_token 时必填）
                redirect_uri:
                  type: string
                  format: uri
                  description: 必须与授权请求一致（authorization_code 时必填）
                client_id:
                  type: string
                client_secret:
                  type: string
                  description: confidential client 必填
                code_verifier:
                  type: string
                  description: PKCE 原始 code_verifier（authorization_code 时必填）
      responses:
        "200":
          description: Token 颁发成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthTokenResponse"
        "400":
          description: 请求错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

  /oauth2/revoke:
    post:
      tags: [OAuth 2.1 授权服务端]
      summary: 撤销端点
      description: 撤销 Access Token 或 Refresh Token。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 要撤销的 Token
                token_type_hint:
                  type: string
                  enum: [access_token, refresh_token]
                  description: 可选，提示 Token 类型
      responses:
        "200":
          description: 撤销成功（无论 Token 是否存在都返回 200）

  /oauth2/introspect:
    post:
      tags: [OAuth 2.1 授权服务端]
      summary: 自省端点
      description: 检查 Token 状态。
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: 自省结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectResponse"

  /.well-known/jwks.json:
    get:
      tags: [OAuth 2.1 授权服务端]
      summary: JWKS 端点
      description: 暴露 RS256 公钥集，支持资源服务器独立验签。
      responses:
        "200":
          description: JWK Set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JWKS"

  # ==========================================================================
  # 系统
  # ==========================================================================
  /ping:
    get:
      tags: [系统]
      summary: 健康检查
      description: 服务存活检查，返回 pong。
      responses:
        "200":
          description: 服务正常
          content:
            text/plain:
              schema:
                type: string
                example: pong

  /health:
    get:
      tags: [系统]
      summary: 深度健康检查
      description: 检查数据库与 Redis 连接状态。
      responses:
        "200":
          description: 所有依赖正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                  checks:
                    type: object
                    properties:
                      database:
                        type: string
                      redis:
                        type: string
                  timestamp:
                    type: string
                    format: date-time
        "503":
          description: 存在依赖不可用

  /oauth2/register:
    post:
      tags: [系统]
      summary: OAuth2 客户端注册
      description: |
        动态注册 OAuth 2.1 客户端。开放注册，任何人可调用。
        限流 5 次/小时/IP。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OAuthClientRegistration"
      responses:
        "200":
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthClientResponse"
        "400":
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OAuthError"

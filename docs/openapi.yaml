      security:
        - BearerAuth: []
      responses:
        "302":
          description: |
            重定向到 GitHub。

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效

  /profile/bind/github/callback:
    get:
      tags: [OAuth 登录]
      summary: GitHub 绑定（回调）
      description: 绑定回调，成功后返回绑定结果。
      security:
        - BearerAuth: []
      responses:

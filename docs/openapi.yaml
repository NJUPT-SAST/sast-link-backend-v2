          description: GitHub 授权码
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: CSRF 防护状态值
      responses:
        "200":
          description: |-
            已绑定，登录成功

            未绑定，返回 OAuth-Ticket

            常见错误码：
            - `10010` OAuth 未绑定
            - `10013` OAuth 绑定失败
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UnifiedResponse"
                properties:
                  Data:
                    oneOf:
                      - $ref: "#/components/schemas/TokenPair"
                      - $ref: "#/components/schemas/OAuthPendingResponse"

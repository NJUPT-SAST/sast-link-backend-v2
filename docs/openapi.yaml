          description: 操作时间
    OAuthTokenRequest:
      type: object
      required:
        - grant_type
        - client_id
      properties:
        grant_type:
          type: string
          enum:
            - authorization_code
            - refresh_token
          description: 授权模式
        code:
          type: string
          description: 授权码（authorization_code 模式必填）
        redirect_uri:
          type: string
          format: uri
          description: 回调地址（authorization_code 模式必填）
        client_id:
          type: string
          description: 客户端标识（必填）
        client_secret:
          type: string
          description: 客户端密钥（第三方应用必填，第一方应用不使用）
        code_verifier:
          type: string
          description: PKCE code verifier 原始值（authorization_code 模式必填）
        refresh_token:
          type: string
          description: 刷新令牌（refresh_token 模式必填）
    OAuthError:
      type: object
      properties:
        error:
          type: string
          enum:
            - invalid_request
            - invalid_client
            - invalid_grant
            - unauthorized_client
            - unsupported_grant_type
            - invalid_scope
          description: RFC 6749 错误代码
        error_description:
          type: string
          description: 错误描述
    # === 通用响应信封（标准端点） ===
    # 所有标准端点使用 { code: int, message: string, data: object|array|null } 响应信封。
    # 以下 StandardEnvelope 为通用模板，各端点的 data schema 在内嵌中各自定义。
    #
    # 不使用信封的例外：
    #   - /oauth/authorize → 成功/错误均为 redirect response，query 携带 code/state 或 error/error_description
    #   - /oauth/token → application/x-www-form-urlencoded 请求；成功/错误均为 OAuth JSON，字段名使用 scope（单数）
    #   - /oauth/revoke → application/x-www-form-urlencoded 请求；RFC 7009 成功为 200 空响应体，错误为 OAuth JSON
    #   - /userinfo → 成功为 OIDC UserInfo claims；错误为 RFC 6750 Bearer Token 格式
    #   - /health → 直接 {status, db, redis}
    #   - /card/{id} → 直接 profile 公开字段
    #   - /.well-known/openid-configuration → OIDC Discovery JSON
    #   - /.well-known/jwks.json → JWKS JSON
    StandardEnvelope:
      type: object
      description: SAST Link v2 标准响应信封模板
      properties:
        code:
          type: integer
          description: 业务状态码，0 表示成功，非 0 表示错误
          example: 0
        message:
          type: string
          description: 可读的描述信息，成功时为 "ok"
          example: ok
        data:
          description: 业务数据载荷，错误时为 null
    # === 具体响应 schema ===
    SendCodeResponse:
      type: object
      description: 发送验证码响应
      properties:
        code:
          type: integer
          description: 业务状态码，0 表示成功
          example: 0
        message:
          type: string
          description: 可读描述信息
          example: ok
        data:
          type: object
          properties:
            message:
              type: string
              description: 提示信息
              example: 验证码已发送至邮箱
            expires_in:
              type: integer
              description: 验证码有效期（秒）
              example: 300
    RegisterTicketResponse:
      type: object
      description: 验证注册验证码响应
      properties:
        code:
          type: integer
          description: 业务状态码
          example: 0
        message:
          type: string
          description: 可读描述信息
          example: ok
        data:
          type: object
          properties:
            register_ticket:
              type: string
              description: Register-Ticket，有效期 5 分钟，一次性使用
              example: reg_abc123def456...
            expires_in:
              type: integer
              description: Ticket 有效期（秒）
              example: 300
    AuthResultResponse:
      type: object
      description: 登录/注册成功响应（含 Token + 用户信息）
      properties:
        code:
          type: integer
          description: 业务状态码
          example: 0
        message:
          type: string
          description: 可读描述信息
          example: ok
        data:
          type: object
          properties:
            access_token:
              type: string
              description: JWT Access Token，有效期 1 小时
            refresh_token:
              type: string
              description: Refresh Token，有效期 30 天，旋转机制
            token_type:
              type: string
              enum:
                - Bearer
              description: Token 类型
            expires_in:
              type: integer
              description: Access Token 有效期（秒）
              example: 3600
            user:
              $ref: '#/components/schemas/AuthUser'
    TokenRefreshResponse:

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效
            - `10012` OAuth 已绑定其他账号
            - `10013` OAuth 绑定失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UnifiedResponse"
  /profile/bind/lark:
    get:
      tags: [OAuth 登录]
      summary: 飞书绑定（发起）
      description: 需登录态，302 重定向到飞书授权页。
      security:
        - BearerAuth: []
      responses:
        "302":
          description: |
            重定向到飞书。

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）
            - `20004` Token 无效

  /profile/bind/lark/callback:
    get:
      tags: [OAuth 登录]
      summary: 飞书绑定（回调）
      description: 同 GitHub 绑定回调逻辑。
      security:
        - BearerAuth: []
      responses:
        "200":
          description: |-
            绑定成功

            常见错误码：
            - `10009` 权限不足（未携带有效 Token）

openapi: 3.0.1
info:
  title: SAST Link v2 API
  description: |
    SAST Link v2 统一认证与用户中心 API。

    - Base URL: `https://link.sast.fun/v2`
    - 认证方式: JWT Bearer Token（`Authorization: Bearer <access_token>`）
    - Content-Type: 标准业务接口使用 `application/json`；OAuth Token/Revoke 使用 `application/x-www-form-urlencoded`
    - OAuth 2.1: 授权端点使用 PKCE-S256，第一方应用无需 client_secret
    - OIDC Provider: 基于 OAuth 2.1 的 OpenID Connect 认证层，scope 含 openid 时返回 ID Token
    - 响应格式: 标准业务接口使用标准化响应信封；OAuth/OIDC/健康检查/公开卡片等协议或直出端点见 StandardEnvelope 注释
  version: 2.0.0
  contact:
    name: SAST
    url: https://sast.fun
tags:
  - name: Auth
  - name: OAuth Login
  - name: Profile
  - name: Identities
  - name: OAuth 2.1 Server
  - name: Admin
  - name: Health
  - name: OIDC
  - name: Card
paths:
  /auth/register/send-code:
    post:
      summary: 发送注册验证码
      deprecated: false
      description: 向指定邮箱发送注册验证码。邮箱域名必须为 `@njupt.edu.cn` 或 `@sast.fun`。
      operationId: authSendRegisterCode
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login_email
              properties:
                login_email:
                  type: string
                  format: email
                  description: 注册邮箱
                  example: b2404****@njupt.edu.cn
            examples: {}
        required: true
      responses:
        '200':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '429':
          $ref: '#/components/responses/TooManyRequests'
          description: 频率限制（429xx）
      security: []
  /auth/register/verify-code:
    post:
      summary: 验证注册验证码
      deprecated: false
      description: 注册第一步。验证邮箱验证码，返回 Register-Ticket（Redis，5 分钟，一次性）。
      operationId: authVerifyRegisterCode
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login_email
                - code
              properties:
                login_email:
                  type: string
                  format: email
                  description: 注册邮箱
                code:
                  type: string
                  description: 邮箱验证码
                  example: '123456'
            examples: {}
        required: true
      responses:
        '200':
          description: 验证成功，返回 Register-Ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterTicketResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security: []
  /auth/register:
    post:
      summary: 完成注册
      deprecated: false
      description: >-
        注册第二步。凭 Register-Ticket + 补充信息完成注册，成功后自动签发 Token。若传入
        oauth_state，注册成功后自动创建对应的 identities 绑定记录。
      operationId: authCompleteRegister
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - register_ticket
                - password
                - name
                - phone_number
                - qq_number
                - college
                - major
                - student_id
              properties:
                register_ticket:
                  type: string
                  description: 验证码验证后下发的 Register-Ticket
                password:
                  type: string
                  minLength: 8
                  description: 登录密码，最短 8 位
                  example: your_password
                name:
                  type: string
                  description: 真实姓名
                  example: 张三
                phone_number:
                  type: string
                  description: 手机号
                  example: '13800138000'
                qq_number:
                  type: string
                  description: QQ 号
                  example: '1234567890'
                registration_state:
                  type: string
                  description: 第三方 OAuth 回调下发的注册暂存令牌（可选，需与 oauth_state 配套使用）
                oauth_state:
                  type: string
                  description: 原始 OAuth CSRF state 参数（可选，与 registration_state 配套校验）
                college:
                  $ref: '#/components/schemas/College'
                  description: 学院
                major:
                  type: string
                  description: 专业
                student_id:
                  type: string
                  maxLength: 50
                  description: 学号
            examples: {}
        required: true
      responses:
        '201':
          description: 注册成功并返回 Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '409':
          $ref: '#/components/responses/Conflict'
          description: 资源冲突（409xx）
      security: []
  /user/login:
    post:
      summary: 密码登录
      deprecated: false
      description: 支持教育邮箱和第三方邮箱密码登录。
      operationId: authPasswordLogin
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login_email
                - password
              properties:
                login_email:
                  type: string
                  format: email
                  description: 登录邮箱
                password:
                  type: string
                  description: 登录密码
            examples: {}
        required: true
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security: []
  /auth/refresh:
    post:
      summary: 刷新 Token（内部登录用）
      deprecated: false
      description: >-
        Refresh Token 旋转机制，每次使用后旧 token 撤销，下发新 token。OAuth 客户端请用 `POST
        /oauth/token`（grant_type=refresh_token）。
      operationId: authRefreshToken
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 刷新令牌
                  example: rt_abc123...
            examples: {}
        required: true
      responses:
        '200':
          description: Token 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefreshResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security: []
  /auth/logout:
    post:
      summary: 登出
      deprecated: false
      description: 撤销当前 access_token（jti）及整条 refresh_token family。
      operationId: authLogout
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
                  description: 刷新令牌
        required: true
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          headers: {}
      security:
        - bearerAuth: []
  /auth/change-password:
    post:
      summary: 修改密码
      deprecated: false
      description: 新密码最短 8 位，修改成功后撤销该用户所有 token family。
      operationId: authChangePassword
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - old_password
                - new_password
              properties:
                old_password:
                  type: string
                  description: 旧密码
                new_password:
                  type: string
                  minLength: 8
                  description: 新密码，最短 8 位
        required: true
      responses:
        '200':
          description: 密码修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
        '422':
          $ref: '#/components/responses/Unprocessable'
          description: 业务校验失败（422xx）
      security:
        - bearerAuth: []
  /auth/forgot-password/send-code:
    post:
      summary: 发送重置密码验证码
      deprecated: false
      description: ''
      operationId: authSendForgotPasswordCode
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login_email
              properties:
                login_email:
                  type: string
                  format: email
                  description: 注册邮箱
            examples: {}
        required: true
      responses:
        '200':
          description: 验证码已发送
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendCodeResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 邮箱不存在（401xx）
        '429':
          $ref: '#/components/responses/TooManyRequests'
          description: 频率限制（429xx）
      security: []
  /auth/reset-password:
    post:
      summary: 重置密码
      deprecated: false
      description: 新密码最短 8 位。
      operationId: authResetPassword
      tags:
        - Auth
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - login_email
                - code
                - new_password
              properties:
                login_email:
                  type: string
                  format: email
                  description: 注册邮箱
                code:
                  type: string
                  description: 邮箱验证码
                new_password:
                  type: string
                  minLength: 8
                  description: 新密码，最短 8 位
            examples: {}
        required: true
      responses:
        '200':
          description: 密码重置成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '422':
          $ref: '#/components/responses/Unprocessable'
          description: 业务校验失败（422xx）
      security: []
  /oauth/github:
    get:
      summary: GitHub 登录
      deprecated: false
      description: 重定向至 GitHub OAuth 授权页。
      operationId: oauthLoginGithub
      tags:
        - OAuth Login
      parameters: []
      responses:
        '302':
          description: 重定向至 GitHub OAuth 授权页
          headers: {}
      security: []
  /oauth/github/callback:
    get:
      summary: GitHub 回调
      deprecated: false
      description: >
        处理 GitHub OAuth 回调。

        - 已有绑定 → 签发一次性 login_code，302 重定向至前端 `?code=<login_code>`

        - 无绑定 → 生成 registration_state（Redis，15min），302 重定向至注册补全页
        `?registration_state=<registration_state>&provider=github&name=<login>&avatar=<url>`
      operationId: oauthGithubCallback
      tags:
        - OAuth Login
      parameters:
        - name: code
          in: query
          description: GitHub 授权码
          required: true
          schema:
            type: string
        - name: state
          in: query
          description: CSRF 状态值
          required: true
          schema:
            type: string
      responses:
        '302':
          description: 重定向至前端
          headers: {}
      security: []
  /oauth/lark:
    get:
      summary: 飞书登录
      deprecated: false
      description: 重定向至飞书 OAuth 授权页。
      operationId: oauthLoginLark
      tags:
        - OAuth Login
      parameters: []
      responses:
        '302':
          description: 重定向至飞书 OAuth 授权页
          headers: {}
      security: []
  /oauth/lark/callback:
    get:
      summary: 飞书回调
      deprecated: false
      description: >
        处理飞书 OAuth 回调，仅限 SAST 企业内飞书用户。

        - 已有绑定 → 签发一次性 login_code，302 重定向至前端

        - 无绑定 → 生成 registration_state（Redis，15min），302 重定向至注册补全页
        `?registration_state=<registration_state>&provider=lark&name=<name>&avatar=<url>`

        - 非 SAST 企业用户 → 拒绝
      operationId: oauthLarkCallback
      tags:
        - OAuth Login
      parameters:
        - name: code
          in: query
          description: 飞书授权码
          required: true
          schema:
            type: string
        - name: state
          in: query
          description: CSRF 状态值
          required: true
          schema:
            type: string
      responses:
        '302':
          description: 重定向至前端
          headers: {}
      security: []
  /oauth/exchange-code:
    post:
      summary: 交换登录码
      deprecated: false
      description: 用 OAuth 回调中的一次性 login_code（Redis，60 秒）换取 token。
      operationId: authExchangeLoginCode
      tags:
        - OAuth Login
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: 一次性登录码
                  example: lc_abc123...
            examples: {}
        required: true
      responses:
        '200':
          description: 交换成功，返回 Token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResultResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security: []
  /user/profile:
    get:
      summary: 获取当前用户信息
      deprecated: false
      description: ''
      operationId: userGetProfile
      tags:
        - Profile
      parameters: []
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security:
        - bearerAuth: []
    put:
      summary: 更新用户资料
      deprecated: false
      description: |
        更新当前登录用户可自助维护的个人信息。允许更新 user 表中的基础信息
        （真实姓名、手机号、QQ 号、学院、专业、学号）以及 profile 表中的展示资料。
        登录邮箱、角色、状态、邮箱类型等身份与权限字段不可通过此接口修改。
      operationId: userUpdateProfile
      tags:
        - Profile
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              minProperties: 1
              properties:
                name:
                  type: string
                  maxLength: 255
                  description: 真实姓名
                  example: 张三
                phone_number:
                  type: string
                  maxLength: 20
                  description: 手机号
                  example: '13800138000'
                qq_number:
                  type: string
                  maxLength: 20
                  description: QQ 号
                  example: '1234567890'
                college:
                  $ref: '#/components/schemas/College'
                  description: 学院
                  example: 计算机学院
                major:
                  type: string
                  maxLength: 50
                  description: 专业
                  example: 软件工程
                student_id:
                  type: string
                  maxLength: 50
                  description: 学号
                  example: B2404****
                nickname:
                  type: string
                  maxLength: 255
                  description: 昵称
                  example: 新昵称
                department:
                  $ref: '#/components/schemas/Department'
                intro:
                  type: string
                  maxLength: 255
                  description: 自我介绍
                  example: 新的自我介绍
                email:
                  type: string
                  format: email
                  maxLength: 255
                  description: 对外展示邮箱
                  example: display@example.com
                blog_url:
                  type: string
                  format: uri
                  maxLength: 512
                  description: 个人博客链接
                  example: https://blog.example.com
                github_url:
                  type: string
                  format: uri
                  maxLength: 512
                  description: GitHub 主页链接
                  example: https://github.com/example
        required: true
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileUpdateResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '422':
          $ref: '#/components/responses/Unprocessable'
          description: 业务校验失败（422xx）
      security:
        - bearerAuth: []
  /user/avatar:
    put:
      summary: 上传头像
      deprecated: false
      description: ''
      operationId: userUploadAvatar
      tags:
        - Profile
      parameters: []
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 图片文件（限制 5MB，格式 jpg/png/webp）
                  example: ''
              required:
                - file
        required: true
      responses:
        '200':
          description: 上传成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
          description: 参数错误（400xx）
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
        '500':
          $ref: '#/components/responses/InternalError'
          description: 服务端错误（500xx）
      security:
        - bearerAuth: []
  /card/{id}:
    get:
      summary: 获取个人卡片
      deprecated: false
      description: |
        公开端点，无需认证。返回 profile 表中公开字段，用于个人主页展示、homepage 友链及 OIDC profile claim 指向。
      operationId: cardGetCard
      tags:
        - Card
      parameters:
        - name: id
          in: path
          description: 用户 ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 个人卡片数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardResponse'
          headers: {}
        '404':
          $ref: '#/components/responses/NotFound'
          description: 用户不存在或已注销
      security: []
  /user/identities:
    get:
      summary: 获取绑定列表
      deprecated: false
      description: ''
      operationId: userListIdentities
      tags:
        - Identities
      parameters: []
      responses:
        '200':
          description: 绑定列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentitiesListResponse'
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
          description: 未认证（401xx）
      security:
        - bearerAuth: []
  /user/identities/lark:
    post:
      summary: 绑定飞书
      deprecated: false
      description: 每个用户只能绑定一个飞书账号，每个飞书账号只能绑定一个用户。
      operationId: userBindLark
      tags:
        - Identities
      parameters:
        - name: code
          in: query
          description: 飞书 OAuth 授权码
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityBindResponse'
          headers: {}
        '409':
          $ref: '#/components/responses/Conflict'
          description: 资源冲突（409xx）
      security:
        - bearerAuth: []
  /user/identities/github:
    post:
      summary: 绑定 GitHub
      deprecated: false
      description: 每个用户只能绑定一个 GitHub 账号，每个 GitHub 账号只能绑定一个用户。
      operationId: userBindGithub
      tags:
        - Identities
      parameters:
        - name: code
          in: query
          description: GitHub OAuth 授权码
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 绑定成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IdentityBindResponse'
          headers: {}
        '409':
          $ref: '#/components/responses/Conflict'
          description: 资源冲突（409xx）
      security:
        - bearerAuth: []
  /user/identities/email:
    post:
      summary: 绑定其他邮箱（第一步）
      deprecated: false
      description: 返回 Bind-Ticket（Redis，5 分钟，一次性），内部携带待绑定邮箱地址。
      operationId: userRequestBindEmail
      tags:
        - Identities
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: 待绑定的第三方邮箱
                  example: myemail@qq.com
        required: true
      responses:
        '200':
          description: 返回 Bind-Ticket
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BindTicketResponse'
          headers: {}
        '409':
          $ref: '#/components/responses/Conflict'
          description: 资源冲突（409xx）
      security:
        - bearerAuth: []
  /user/identities/email/verify:
    post:
      summary: 确认绑定其他邮箱（第二步）
      deprecated: false
      description: 凭 Bind-Ticket + 验证码完成绑定。每个用户最多绑定 2 个第三方邮箱。
      operationId: userVerifyBindEmail
      tags:

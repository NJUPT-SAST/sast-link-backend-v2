  /oauth/authorize:
    get:
      summary: 授权端点
      deprecated: false
      description: |
        检查用户登录状态 → 展示授权页 → 用户同意后重定向至 redirect_uri，携带 code 和 state。
        使用 PKCE-S256 进行授权码交换，仅接受 code_challenge_method=S256。错误时重定向携带 error 参数。
      operationId: oauthAuthorize
      tags:
        - OAuth 2.1 Server
      parameters:
        - name: response_type
          in: query
          description: 固定值 `code`
          required: true
          schema:
            type: string
            enum:
              - code
        - name: client_id
          in: query
          description: 客户端标识
          required: true
          schema:
            type: string
        - name: redirect_uri
          in: query
          description: 回调地址
          required: true
          schema:
            type: string
            format: uri
        - name: scope
          in: query
          description: 授权范围，空格分隔（如 `openid profile`）。OAuth 线协议字段为单数 `scope`，数据库列保留 `scopes`
          required: true
          schema:
            type: string
        - name: state
          in: query
          description: CSRF 防护，客户端生成随机字符串，回调时原样返回
          required: true
          schema:
            type: string
        - name: code_challenge
          in: query
          description: PKCE code challenge
          required: true
          schema:
            type: string
        - name: code_challenge_method
          in: query
          description: PKCE 挑战方法，仅支持 S256
          required: true
          schema:
            type: string
            enum:
              - S256
        - name: nonce
          in: query
          description: OIDC nonce（可选参数）
          required: false
          schema:
            type: string
      responses:
        '302':
          description: >-
            重定向至 redirect_uri，携带 code 和 state。错误时携带 error 参数（如
            `?error=invalid_request&error_description=...`）。
          headers: {}
      security: []
  /oauth/token:
    post:
      summary: Token 端点
      deprecated: false
      description: |
        支持 grant_type: `authorization_code` 和 `refresh_token`。
        第一方应用使用 PKCE 无需 client_secret，第三方应用需提供 client_secret。
        此端点不遵循标准响应信封，请求体必须使用 application/x-www-form-urlencoded，成功和错误均使用 RFC 6749 格式。
        scope 包含 `openid` 时，响应额外返回 `id_token`（RS256 签名 JWT）。
      operationId: oauthToken
      tags:
        - OAuth 2.1 Server
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
            examples:
              auth_code_first_party:
                value:
                  grant_type: authorization_code
                  code: auth_code_abc123...
                  redirect_uri: https://app.example.com/callback
                  client_id: 381c34b9-14a4-4df9-a9db-40c2455be09f
                  code_verifier: pkce_verifier_raw_string...
                summary: 第一方应用 - 授权码模式
              auth_code_third_party:
                value:
                  grant_type: authorization_code
                  code: auth_code_abc123...
                  redirect_uri: https://app.example.com/callback
                  client_id: 381c34b9-14a4-4df9-a9db-40c2455be09f
                  client_secret: 3K7mDzX434GbFm9YAePJ9FXQNjT6MF0U
                  code_verifier: pkce_verifier_raw_string...
                summary: 第三方应用 - 授权码模式
              refresh_token_first_party:
                value:
                  grant_type: refresh_token
                  refresh_token: rt_abc123...
                  client_id: 381c34b9-14a4-4df9-a9db-40c2455be09f
                summary: 第一方应用 - 刷新 Token
              refresh_token_third_party:
                value:
                  grant_type: refresh_token
                  refresh_token: rt_abc123...
                  client_id: 381c34b9-14a4-4df9-a9db-40c2455be09f
                  client_secret: 3K7mDzX434GbFm9YAePJ9FXQNjT6MF0U
                summary: 第三方应用 - 刷新 Token
        required: true
      responses:
        '200':
          description: Token 签发成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthTokenResponse'
          headers: {}
        '400':
          description: OAuth 错误（RFC 6749 格式）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
          headers: {}
      security: []
  /oauth/revoke:
    post:
      summary: Token 撤销
      deprecated: false
      description: |
        撤销整条 token family。请求体必须使用 application/x-www-form-urlencoded。
        遵循 RFC 7009，成功固定返回 200 OK 且响应体为空。
      operationId: oauthRevokeToken
      tags:
        - OAuth 2.1 Server
      parameters: []
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - token
                - client_id
              properties:
                token:
                  type: string
                  description: 待撤销的 token
                  example: rt_abc123...
                token_type_hint:
                  type: string
                  enum:
                    - access_token
                    - refresh_token
                  description: Token 类型提示
                client_id:
                  type: string
                  description: 客户端标识
        required: true
      responses:
        '200':
          description: 撤销成功，RFC 7009 要求返回 200 OK 且响应体为空
          headers: {}
        '400':
          description: OAuth 错误（RFC 6749 / RFC 7009 格式）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuthError'
          headers: {}
      security: []

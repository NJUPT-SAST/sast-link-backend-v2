        blog_url:
          type: string
          format: uri
          description: 个人博客链接
          example: https://blog.example.com
        github_url:
          type: string
          format: uri
          description: GitHub 主页链接
          example: https://github.com/example
    OpenIDConfiguration:
      type: object
      description: |
        OIDC Discovery 文档，符合 [OpenID Connect Discovery 1.0](https://openid.net/specs/openid-connect-discovery-1_0.html) 规范。
      properties:
        issuer:
          type: string
          description: OIDC Provider 唯一标识，与 ID Token 中的 iss 一致
          example: https://link.sast.fun/v2
        authorization_endpoint:
          type: string
          description: OAuth 2.0 授权端点
          example: https://link.sast.fun/v2/oauth/authorize
        token_endpoint:
          type: string
          description: OAuth 2.0 Token 端点
          example: https://link.sast.fun/v2/oauth/token
        userinfo_endpoint:
          type: string
          description: UserInfo 端点
          example: https://link.sast.fun/v2/userinfo
        jwks_uri:
          type: string
          description: JWKS 公钥集端点
          example: https://link.sast.fun/v2/.well-known/jwks.json
        revocation_endpoint:
          type: string
          description: Token 撤销端点
          example: https://link.sast.fun/v2/oauth/revoke
        scopes_supported:
          type: array
          items:
            type: string
          description: 支持的 scope
          example:
            - openid
            - profile
            - email
        response_types_supported:
          type: array
          items:
            type: string
          description: 支持的 response_type
          example:
            - code
        grant_types_supported:
          type: array
          items:
            type: string
          description: 支持的 grant_type
          example:
            - authorization_code
            - refresh_token
        subject_types_supported:
          type: array
          items:
            type: string
          description: 支持的 subject 类型
          example:
            - public
        id_token_signing_alg_values_supported:
          type: array
          items:
            type: string
          description: ID Token 签名算法
          example:
            - RS256
        token_endpoint_auth_methods_supported:
          type: array
          items:
            type: string
          description: Token 端点客户端认证方式
          example:
            - none
            - client_secret_post
        claims_supported:
          type: array
          items:
            type: string
          description: 支持的 claims
          example:
            - sub
            - iss
            - aud
            - exp
            - iat
            - auth_time
            - nonce
            - name
            - picture
            - preferred_username
            - profile
            - email
            - email_verified
            - updated_at
        code_challenge_methods_supported:
          type: array
          items:
            type: string
          description: 支持的 PKCE 挑战方法（S256-only；V001 数据库历史约束曾允许 plain，V002 收紧）
          example:
            - S256
        request_parameter_supported:
          type: boolean
          description: 是否支持 request 参数
          example: false
        request_uri_parameter_supported:
          type: boolean
          description: 是否支持 request_uri 参数
          example: false
        claims_parameter_supported:
          type: boolean
          description: 是否支持 claims 参数
          example: false
        response_modes_supported:
          type: array
          items:
            type: string
          description: 支持的 response_mode
          example:
            - query
        claim_types_supported:
          type: array
          items:
            type: string
          description: 支持的 claim 类型
          example:
            - normal
    JWKS:
      type: object
      description: JSON Web Key Set，符合 [RFC 7517](https://datatracker.ietf.org/doc/html/rfc7517) 规范
      properties:
        keys:
          type: array
          description: 公钥列表
          items:
            $ref: '#/components/schemas/JWK'
    JWK:
      type: object
      description: JSON Web Key，RS256 公钥
      properties:
        kty:
          type: string
          description: 密钥类型
          example: RSA
        use:
          type: string
          description: 用途
          example: sig
        kid:
          type: string
          description: 密钥 ID，用于匹配 JWT 头中的 kid
          example: link-v2-2026-06
        alg:
          type: string
          description: 签名算法
          example: RS256
        n:
          type: string
          description: RSA 公钥 modulus（Base64URL）
          example: 0vx7agoebGcQSuuPiLgX...
        e:
          type: string
          description: RSA 公钥 exponent（Base64URL）
          example: AQAB
    UserInfoResponse:
      type: object
      description: |
        OIDC UserInfo 端点响应。返回的 claims 取决于 Access Token 的 scope：
        - `openid` → sub（必返）
        - `profile` → name, picture, preferred_username, profile, updated_at
        - `email` → email, email_verified
      properties:
        sub:
          type: string
          description: 用户唯一标识（user.id 字符串）。openid scope 时必返
          example: '1'
        name:
          type: string
          description: 真实姓名。需 profile scope
          example: 张三
        picture:
          type: string
          format: uri
          description: 头像 URL。需 profile scope
          example: https://cos.example.com/avatar/1.jpg
          nullable: true
        preferred_username:
          type: string
          description: 昵称（fallback 至姓名）。需 profile scope
          example: 张三
          nullable: true
        profile:
          type: string
          format: uri
          description: 用户主页（SAST Link 个人卡片）。需 profile scope
          example: https://link.sast.fun/card/1
          nullable: true
        email:
          type: string
          format: email
          description: 注册邮箱。需 email scope
          example: b2404****@njupt.edu.cn
        email_verified:
          type: boolean
          description: 邮箱是否已验证。需 email scope。SAST Link 注册时已校验邮箱，固定为 true
          example: true
        updated_at:
          type: integer
          description: 用户信息最后修改时间（Unix timestamp）。需 profile scope
          example: 1717396400
          nullable: true
    IDTokenClaims:
      type: object
      description: |
        ID Token claims 说明（仅供文档参考，非实际返回结构）。
        ID Token 是一个 RS256 签名的 JWT，当 scope 包含 `openid` 时在 token 端点响应中返回。
        其 Header 包含 `alg=RS256` 和 `kid`，Payload 包含以下 claims。
      properties:
        iss:
          type: string
          description: Issuer，OIDC Provider 标识
          example: https://link.sast.fun/v2
        sub:
          type: string
          description: Subject，用户唯一标识（user.id 字符串）
          example: '1'
        aud:
          type: string
          description: Audience，客户端 client_id
          example: 381c34b9-14a4-4df9-a9db-40c2455be09f
        exp:
          type: integer
          description: 过期时间（Unix timestamp）
          example: 1717400000
        iat:
          type: integer
          description: 签发时间（Unix timestamp）
          example: 1717396400
        auth_time:
          type: integer
          description: 用户完成认证的时间（Unix timestamp）。授权码模式下为授权确认时间
          example: 1717396400
        nonce:
          type: string
          description: 防重放值，与授权请求中的 nonce 一致
          example: n-0S6_WzA2Mj
        name:
          type: string
          description: 真实姓名（需 profile scope）
          example: 张三
        picture:
          type: string
          format: uri
          description: 头像 URL（需 profile scope）
          example: https://cos.example.com/avatar/1.jpg
          nullable: true
        preferred_username:
          type: string
          description: 昵称 / 常用用户名（需 profile scope）
          example: 张三
          nullable: true
        profile:
          type: string
          format: uri
          description: 用户主页 URL（需 profile scope）
          example: https://link.sast.fun/card/1
          nullable: true
        email:
          type: string
          format: email
          description: 注册邮箱（需 email scope）
          example: b2404****@njupt.edu.cn
        email_verified:
          type: boolean
          description: 邮箱已验证（需 email scope，SAST Link 固定为 true）
          example: true
        updated_at:
          type: integer
          description: 用户信息最后修改时间，Unix timestamp（需 profile scope）
          example: 1717396400
          nullable: true
  responses:
    BadRequest:
      description: 参数错误（400xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
                description: 业务状态码
              message:
                type: string
                description: 错误描述
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            invalid_params:
              summary: invalid_params
              value:
                code: 40000
                message: 请求参数错误
                data: null
            missing_params:
              summary: missing_params
              value:
                code: 40001
                message: 缺少必要参数
                data: null
            invalid_email_domain:
              summary: invalid_email_domain
              value:
                code: 40020
                message: 邮箱域名不允许（仅限 @njupt.edu.cn / @sast.fun）
                data: null
    Unauthorized:
      description: 未认证（401xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            not_logged_in:
              summary: not_logged_in
              value:
                code: 40100
                message: 未登录（缺少或无效 Authorization Header）
                data: null
            wrong_password:
              summary: wrong_password
              value:
                code: 40105
                message: 密码错误
                data: null
            email_not_found:
              summary: email_not_found
              value:
                code: 40106
                message: 登录邮箱不存在
                data: null
    Forbidden:
      description: 无权限（403xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            no_permission:
              summary: no_permission
              value:
                code: 40300
                message: 无权限（需 admin / lecturer 角色）
                data: null
            account_deleted:
              summary: account_deleted
              value:
                code: 40301
                message: 账号已注销
                data: null
    NotFound:
      description: 资源不存在（404xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            not_found:
              summary: not_found
              value:
                code: 40400
                message: 资源不存在
                data: null
            user_not_found:
              summary: user_not_found
              value:
                code: 40401
                message: 用户不存在
                data: null
    Conflict:
      description: 资源冲突（409xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            email_registered:
              summary: email_registered
              value:
                code: 40901
                message: 邮箱已被注册
                data: null
            identity_bound:
              summary: identity_bound
              value:
                code: 40903
                message: 第三方账号已被其他用户绑定
                data: null
            too_many_emails:
              summary: too_many_emails
              value:
                code: 40905
                message: 第三方邮箱绑定数量已达上限（2 个）
                data: null
    Unprocessable:
      description: 业务校验失败（422xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            short_password:
              summary: short_password
              value:
                code: 42201
                message: 密码长度不足（最短 8 位）
                data: null

    TooManyRequests:
      description: 频率限制（429xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            rate_limited:
              summary: rate_limited
              value:
                code: 42900
                message: 请求过于频繁，请稍后再试
                data: null
    InternalError:
      description: 服务端错误（500xx）
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: integer
              message:
                type: string
              data:
                type: 'null'
            required:
              - code
              - message
              - data
          examples:
            internal:
              summary: internal
              value:
                code: 50000
                message: 服务器内部错误
                data: null
            email_fail:
              summary: email_fail
              value:
                code: 50001
                message: 邮件发送失败
                data: null
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT Bearer Token。Access Token 有效期 1 小时。
servers: []
security: []

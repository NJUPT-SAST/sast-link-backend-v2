                properties:
                  Data:
                    oneOf:
                      - $ref: "#/components/schemas/TokenPair"
                      - $ref: "#/components/schemas/OAuthPendingResponse"
  /profile/bind/github:
    get:
      tags: [OAuth 登录]
      summary: GitHub 绑定（发起）

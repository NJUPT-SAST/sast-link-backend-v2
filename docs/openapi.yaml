        "302":
          description: 重定向到 GitHub

  /login/github/callback:
    get:
      tags: [OAuth 登录]
      summary: GitHub 登录（回调）
      description: |
        GitHub OAuth 回调。已绑定账号直接登录返回双 Token；
        未绑定返回 OAuth-Ticket + 临时用户信息，前端引导补全注册。
      parameters:
        - name: code

          description: 未绑定，返回 OAuth-Ticket
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/UnifiedResponse"
                properties:
                  Data:
                    type: object
                    properties:
                      oauthTicket:
                        type: string
                      nickname:
                        type: string

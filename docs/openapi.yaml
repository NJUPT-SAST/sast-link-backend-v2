    OAuthTokenResponse:
      type: object
      description: |
        OAuth 2.1 Token 响应（RFC 6749 格式，不使用 SAST Link 标准响应信封）。
        scope 包含 `openid` 时，额外返回 OIDC ID Token。
        字段名 `scope` 为 OAuth 线协议标准单数字段；数据库列仍保留 `scopes`。
      properties:
        access_token:
          type: string
          description: JWT Access Token
        refresh_token:
          type: string
          description: Refresh Token
        token_type:
          type: string
          enum:
            - Bearer
          description: Token 类型
        expires_in:
          type: integer
          description: Access Token 有效期（秒）
          example: 3600
        id_token:
          type: string
          description: |
            OIDC ID Token（RS256 签名 JWT）。仅在 scope 包含 `openid` 时返回。
            ID Token 包含以下 OIDC 标准 claims，具体内容取决于授权 scope。
          example: eyJhbGciOiJSUzI1NiIs...
        scope:
          type: string
          description: 授权范围，空格分隔，取值见 OAuthScope 枚举（openid / profile / email）
          example: openid profile

# golangci-lint configuration for SAST Link v2
# Conservative set: core correctness + security + minimal style, low false-positive rate.

run:
  timeout: 5m
  tests: true

linters:
  enable:
    # core correctness
    - govet          # go vet — official static analysis
    - errcheck       # unchecked error returns
    - staticcheck    # deep static analysis (bugs, performance, simplifications)
    - unused         # unused variables, constants, functions

    # formatting and imports
    - gofmt          # go fmt format check
    - goimports      # import ordering + unused imports removal

    # security and robustness
    - gosec          # security rules (SQL injection, hardcoded creds, etc.)
    - bodyclose      # unclosed HTTP response bodies — critical for Gin handlers
    - noctx          # http.Request without context — ensures GORM calls use WithContext
    - sqlclosecheck  # unclosed database/sql rows and statements

    # project-specific
    - misspell       # common English typos
    - unconvert      # unnecessary type conversions

linters-settings:
  revive:
    rules:
      - name: exported
        severity: warning
        disabled: false

  gosec:
    excludes:
      - G104    # allow unchecked Write / Close return values

  goimports:
    local-prefixes: github.com/NJUPT-SAST/sast-link-backend-v2

  govet:
    enable-all: true
    disable:
      - fieldalignment    # struct field alignment optimization — noisy, enable on demand

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - revive
      text: "exported"

  max-issues-per-linter: 0
  max-same-issues: 0

version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - gocritic
    - misspell
    - noctx
    - prealloc
    - revive
    - unconvert
  settings:
    misspell:
      locale: US
    gocritic:
      enabled-tags:
        - performance
        - style
        - diagnostic
        - experimental
        - opinionated
      disabled-checks:
        - whyNoLint

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/NJUPT-SAST/sast-link-backend-v2

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - gosec
    - misspell
    - noctx
    - sqlclosecheck
    - unconvert
  settings:
    gosec:
      excludes:
        - G104
    govet:
      disable:
        - fieldalignment
      enable-all: true
    revive:
      rules:
        - name: exported
          severity: warning
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - revive
        path: _test\.go
        text: exported
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/NJUPT-SAST/sast-link-backend-v2
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
